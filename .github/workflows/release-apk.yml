# When you push a version tag (e.g. v1.0.1), build the debug APK and publish a GitHub Release
# with thedigitalarchitect-latest-debug.apk so the README direct-download link works.
name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - run: npm ci

      - name: Build web and sync Capacitor
        run: npm run build:android

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release asset name
        run: cp android/app/build/outputs/apk/debug/app-debug.apk thedigitalarchitect-latest-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: thedigitalarchitect-latest-debug.apk
          generate_release_notes: true
