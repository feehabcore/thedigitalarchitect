<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1326" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>The Digital Architect</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('tda_theme_v1');
          var pref = raw ? JSON.parse(raw) : 'system';
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var resolved =
            pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0b1326' : '#eef2ff');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
